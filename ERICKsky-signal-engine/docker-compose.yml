services:

  signal-bot:
    build: ./signal-bot
    container_name: erickskybot-engine
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./signal-bot/.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - erickskybot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-worker:
    build: ./signal-bot
    container_name: erickskybot-celery
    restart: always
    command: celery -A celery_app worker --loglevel=info -c 4 --queues=signals,default
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./signal-bot/.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - erickskybot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  celery-beat:
    build: ./signal-bot
    container_name: erickskybot-beat
    restart: always
    command: celery -A celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./signal-bot/.env:/app/.env:ro
      - celerybeat_data:/app/celerybeat
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - erickskybot-network

  dashboard:
    build: ./dashboard
    container_name: erickskybot-dashboard
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dashboard/.env:/var/www/html/.env:ro
    environment:
      - APP_ENV=production
    networks:
      - erickskybot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:15-alpine
    container_name: erickskybot-postgres
    restart: always
    environment:
      POSTGRES_DB: erickskybot
      POSTGRES_USER: erickskybot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./signal-bot/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erickskybot -d erickskybot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erickskybot-network

  redis:
    image: redis:7-alpine
    container_name: erickskybot-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - erickskybot-network

  nginx:
    image: nginx:alpine
    container_name: erickskybot-nginx
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - dashboard
    networks:
      - erickskybot-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  celerybeat_data:

networks:
  erickskybot-network:
    driver: bridge
