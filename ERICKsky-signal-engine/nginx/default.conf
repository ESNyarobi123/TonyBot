upstream dashboard {
    server dashboard:8000;
}

upstream signal_bot {
    server signal-bot-api:8000;
}

# Dashboard - skyfxbot.spotbox.online
server {
    listen 80;
    listen 443 ssl http2;
    server_name skyfxbot.spotbox.online;

    ssl_certificate /etc/nginx/ssl/skyfxbot.crt;
    ssl_certificate_key /etc/nginx/ssl/skyfxbot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;

    client_max_body_size 20M;

    # Proxy to Laravel dashboard
    location / {
        proxy_pass         http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffers      8 16k;
        proxy_buffer_size  32k;
    }

    # WebSocket support for Laravel Reverb
    location /app {
        proxy_pass         http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
    }

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "Dashboard OK\n";
        add_header Content-Type text/plain;
    }
}

# API Backend - apiskyfxbot.spotbox.online
server {
    listen 80;
    listen 443 ssl http2;
    server_name apiskyfxbot.spotbox.online;

    ssl_certificate /etc/nginx/ssl/apiskyfxbot.crt;
    ssl_certificate_key /etc/nginx/ssl/apiskyfxbot.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;

    client_max_body_size 50M;

    # Proxy to Python signal bot API
    location / {
        proxy_pass         http://signal_bot;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Gzip for API responses
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      application/json text/plain;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "API OK\n";
        add_header Content-Type text/plain;
    }
}
